<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image to Speech</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">

        <!-- Theme toggle -->
        <div class="theme-toggle" style="display: flex; align-items: center; gap: 1rem;">
            <a href="https://github.com/jajera/image-to-speech-webapp" title="View on GitHub">🔗 GitHub</a>
            <button id="themeIcon" onclick="toggleTheme()" title="Toggle Theme">🌞</button>
        </div>

        <h1>🖼️ Image to Speech Tool</h1>

        <!-- Drop or paste area -->
        <div id="dropzone" class="dropzone" tabindex="0">
            <p>📥 Paste (Ctrl+V) or drop an image here</p>
            <input type="file" id="imageInput" accept="image/*" />
        </div>

        <!-- Hidden canvas for OCR -->
        <canvas id="canvas" style="display: none;"></canvas>

        <!-- Extracted text -->
        <div id="extractedText" class="extracted-text" aria-label="Extracted text area"></div>

        <!-- Voice selection -->
        <div>
            <label for="voiceSelect">Voice</label>
            <select id="voiceSelect"></select>
        </div>

        <!-- Rate and pitch sliders -->
        <div class="row">
            <div>
                <label for="rate">Rate: <span id="rateValue">1</span></label>
                <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" />
            </div>
            <div>
                <label for="pitch">Pitch: <span id="pitchValue">1</span></label>
                <input type="range" id="pitch" min="0" max="2" step="0.1" value="1" />
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button onclick="speakText()">▶️ Play</button>
            <button onclick="stopSpeaking()">⏹️ Stop</button>
            <button onclick="clearText()">🧹 Clear</button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
